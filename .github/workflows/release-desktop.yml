name: Release Desktop App

# Creates a clean GitHub Release containing only the desktop installers.
# - Triggered by version tags (v0.1.0, v1.2.3, ...) → full published release
# - workflow_dispatch: build artifacts always; check "publish_release" + provide version to create a (draft) GitHub Release
# - Windows x64 NSIS + unsigned macOS Apple Silicon DMG builds
# - Version from tag or input is synced into tauri.conf.json + Cargo.toml before build
# - A dedicated release job collects artifacts and publishes a single clean release
# - After merging a PR, use the manual dispatch (or push a tag) to publish the setup.exe etc.
on:
  push:
    tags:
      - "v*.*.*"
    branches:
      - main   # builds artifacts on every merge to main (for testing). Use manual dispatch + publish_release to create a GitHub Release.
  pull_request: {}   # validate desktop build (including sidecars) on PRs
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create and publish a GitHub Release (with installers attached)"
        required: false
        default: false
        type: boolean
      version:
        description: "Version for the release (e.g. 0.2.0). Used when manually triggering."
        required: false
        default: ""
        type: string

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest
    env:
      BEACON_PYTHON: python
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install backend dependencies (+ PyInstaller)
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify desktop build Python
        run: python -c "import PyInstaller; print('PyInstaller', PyInstaller.__version__)"

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Determine and sync release version
        working-directory: frontend/src-tauri
        shell: bash
        run: |
          set -e

          # Prefer explicit input > tag > current file
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            # Fallback to whatever is committed (for PR/main builds and plain dispatch)
            VERSION=$(node -e '
              const fs = require("fs");
              const conf = JSON.parse(fs.readFileSync("tauri.conf.json", "utf8"));
              console.log(conf.version || "0.0.0");
            ')
          fi

          echo "Using version for build: $VERSION"

          # Patch tauri.conf.json (affects the final NSIS .exe name and app metadata)
          node -e '
            const fs = require("fs");
            const p = "tauri.conf.json";
            const conf = JSON.parse(fs.readFileSync(p, "utf8"));
            conf.version = process.argv[1];
            fs.writeFileSync(p, JSON.stringify(conf, null, 2) + "\n");
            console.log("Patched tauri.conf.json →", process.argv[1]);
          ' "$VERSION"

          # Patch Cargo.toml (Tauri Rust side uses this)
          node -e '
            const fs = require("fs");
            let toml = fs.readFileSync("Cargo.toml", "utf8");
            const newV = process.argv[1];
            toml = toml.replace(/^version\s*=\s*"[^"]*"/m, `version = "${newV}"`);
            fs.writeFileSync("Cargo.toml", toml);
            console.log("Patched Cargo.toml →", newV);
          ' "$VERSION"
        env:
          GITHUB_REF: ${{ github.ref }}

      # Builds the Python sidecars (backend + mcp_server) + Tauri desktop app.
      # The signing key env vars are required because createUpdaterArtifacts is
      # on — the build emits a signed installer + a .sig used by the updater.
      - name: Build backend sidecar + desktop app
        working-directory: frontend
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm run desktop:build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beacon-windows-x64
          if-no-files-found: error
          retention-days: 14
          path: |
            frontend/src-tauri/target/release/bundle/nsis/*.exe
            frontend/src-tauri/target/release/bundle/nsis/*.sig

  build-macos:
    runs-on: macos-15
    env:
      BEACON_PYTHON: python3
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install desktop backend dependencies
        working-directory: backend
        run: python3 -m pip install -r requirements-desktop.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Determine and sync release version
        working-directory: frontend/src-tauri
        shell: bash
        run: |
          set -e
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(node -e 'const c=require("./tauri.conf.json"); console.log(c.version || "0.0.0")')
          fi
          node -e '
            const fs = require("fs");
            const p = "tauri.conf.json";
            const conf = JSON.parse(fs.readFileSync(p, "utf8"));
            conf.version = process.argv[1];
            fs.writeFileSync(p, JSON.stringify(conf, null, 2) + "\n");
          ' "$VERSION"
          node -e '
            const fs = require("fs");
            const p = "Cargo.toml";
            let toml = fs.readFileSync(p, "utf8");
            toml = toml.replace(/^version\s*=\s*"[^"]*"/m, `version = "${process.argv[1]}"`);
            fs.writeFileSync(p, toml);
          ' "$VERSION"

      - name: Build unsigned macOS app and DMG
        working-directory: frontend
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm run desktop:build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: beacon-macos-arm64
          if-no-files-found: error
          retention-days: 14
          # DMG for manual download + the .app.tar.gz updater artifact (and its
          # signature) so the in-app updater can offer macOS updates too.
          path: |
            frontend/src-tauri/target/release/bundle/dmg/*.dmg
            frontend/src-tauri/target/release/bundle/macos/*.app.tar.gz
            frontend/src-tauri/target/release/bundle/macos/*.app.tar.gz.sig

  # Dedicated job: collects the verified Windows installer and creates one clean release.
  # This ensures we attach only the installers (no source code in the main assets).
  release:
    needs: [build, build-macos]
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download desktop installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: beacon-*
          merge-multiple: true

      - name: Determine release version for naming
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            REL_VER="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            REL_VER="${GITHUB_REF#refs/tags/v}"
          else
            REL_VER="${{ github.ref_name }}"
          fi
          echo "release_version=$REL_VER" >> $GITHUB_OUTPUT
          echo "Release display version: $REL_VER"

      # Build the Tauri v2 updater manifest that the in-app updater polls at
      # /releases/latest/download/latest.json. Assembles one entry per platform
      # whose signed updater artifact is present (Windows .exe, macOS .app.tar.gz).
      - name: Generate updater manifest (latest.json)
        env:
          REL_VER: ${{ steps.ver.outputs.release_version }}
        run: |
          set -e
          REPO="${GITHUB_REPOSITORY}"
          PLATFORMS='{}'

          add_platform() {
            # $1 = tauri platform key, $2 = artifact file path (may be nested)
            local key="$1" file="$2"
            local base sig url
            base=$(basename "$file")
            # The .sig sits next to the artifact; downloaded artifacts keep their
            # bundle subdirs (e.g. macos/), so search recursively rather than
            # assuming a flat artifacts/ layout.
            sig=$(find artifacts -name "${base}.sig" | head -1)
            if [ -z "$sig" ] || [ ! -f "$sig" ]; then
              echo "::error::Missing signature for ${base} — was TAURI_SIGNING_PRIVATE_KEY set on the build job?"
              exit 1
            fi
            url="https://github.com/${REPO}/releases/download/v${REL_VER}/${base}"
            PLATFORMS=$(echo "$PLATFORMS" | jq \
              --arg k "$key" --arg s "$(cat "$sig")" --arg u "$url" \
              '. + {($k): {signature:$s, url:$u}}')
            echo "  + $key -> $base"
          }

          # find (recursive) — artifacts land in per-bundle subdirs (nsis/, macos/).
          EXE=$(find artifacts -name '*-setup.exe' | head -1)
          [ -n "$EXE" ] && add_platform "windows-x86_64" "$EXE"

          MAC=$(find artifacts -name '*.app.tar.gz' | head -1)
          [ -n "$MAC" ] && add_platform "darwin-aarch64" "$MAC"

          if [ "$PLATFORMS" = "{}" ]; then
            echo "No signed updater artifacts found — skipping latest.json."
            exit 0
          fi

          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          NOTES="Beacon v${REL_VER} — see https://github.com/${REPO}/releases/tag/v${REL_VER}"
          jq -n \
            --arg v "$REL_VER" --arg notes "$NOTES" --arg date "$PUB_DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version:$v, notes:$notes, pub_date:$date, platforms:$platforms}' \
            > artifacts/latest.json
          echo "Generated latest.json:"; cat artifacts/latest.json

      - name: Publish Desktop Installers to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # For real tags, reuse the tag that triggered us. For manual dispatch we synthesize a tag.
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.ver.outputs.release_version) }}
          name: Beacon ${{ steps.ver.outputs.release_version }}
          generate_release_notes: true
          make_latest: ${{ startsWith(github.ref, 'refs/tags/') }}
          draft: ${{ github.event_name == 'workflow_dispatch' }}
          fail_on_unmatched_files: false
          body: |
            ## Beacon ${{ steps.ver.outputs.release_version }}

            Desktop release with bundled backend + MCP server (no Python required).

            **Download the installer for your platform below.**

            **Windows 10/11 (x64)** — download the `.exe` and run it.

            **macOS (Apple Silicon)** — download the `.dmg`, open it, and drag
            Beacon to Applications. Beacon isn't notarized yet, so on first launch
            macOS may say it's "damaged" or from an unidentified developer. That's
            Gatekeeper blocking an unsigned app — it's not actually damaged. Clear
            the quarantine flag once, then open normally:

            ```bash
            xattr -dr com.apple.quarantine /Applications/Beacon.app
            ```

            (Alternatively: try to open it, then go to System Settings → Privacy &
            Security → "Open Anyway".)

            After the first install, Beacon updates itself in-app on both platforms.

            > ⚠️ The "Source code (zip)" and "Source code (tar.gz)" files below are **automatically generated by GitHub**.
            > Use the `.exe`/`.dmg` installer for the full desktop experience.
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.app.tar.gz
            artifacts/latest.json

      # Announce inline here rather than via a separate `release: published`
      # workflow — releases created by GITHUB_TOKEN do NOT trigger that event,
      # so the old discord-changelog.yml never fired on auto-releases.
      - name: Check out repo (for changelog notes)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/checkout@v4

      - name: Announce release to Discord
        if: startsWith(github.ref, 'refs/tags/')
        env:
          WEBHOOK: ${{ secrets.DISCORD_CHANGELOG_WEBHOOK }}
          REL_VER: ${{ steps.ver.outputs.release_version }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$WEBHOOK" ]; then
            echo "DISCORD_CHANGELOG_WEBHOOK not set — skipping announce."
            exit 0
          fi
          TAG="v${REL_VER}"
          URL="https://github.com/${REPO}/releases/tag/${TAG}"
          # Pull this version's section out of docs/changelog.md (drop the Compare line).
          BODY=$(awk -v v="$REL_VER" '$0 ~ ("^## \\[" v "\\]") {f=1; next} /^## \[/{f=0} f' docs/changelog.md 2>/dev/null | sed '/^\[Compare/d' | head -c 3800)
          [ -z "$BODY" ] && BODY="A new Beacon release is out — see the notes and download on GitHub."
          payload=$(jq -n \
            --arg title "🚀 Beacon ${TAG}" --arg url "$URL" \
            --arg desc "$BODY" --arg footer "Beacon • ${TAG}" \
            '{username:"Beacon Releases", embeds:[{title:$title, url:$url, description:$desc, color:5793266, footer:{text:$footer}}]}')
          code=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -H "Content-Type: application/json" -X POST "$WEBHOOK" -d "$payload")
          echo "Discord responded: $code"; cat /tmp/resp.txt || true
          case "$code" in 2*) : ;; *) echo "::warning::Discord announce failed ($code)" ;; esac
